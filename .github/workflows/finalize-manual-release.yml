name: Finalize approved release

on:
  pull_request:
    types: [closed]
    branches: [master]
  workflow_dispatch:
    inputs:
      source_sha:
        description: Exact current master commit to tag after a failed finalizer
        required: true
        type: string
      version:
        description: Exact synchronized release version
        required: true
        type: string

permissions:
  contents: read

jobs:
  tag:
    name: Tag approved release
    if: >
      github.repository_owner == 'grok-insider' &&
      ((github.event_name == 'pull_request'
        && github.event.pull_request.merged == true
        && (startsWith(github.event.pull_request.head.ref, 'release-please--')
            || startsWith(github.event.pull_request.head.ref, 'release-please-manual-')))
       || (github.event_name == 'workflow_dispatch' && github.actor == 'grok-insider'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Require the release token
        env:
          RELEASE_PLZ_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
        run: test -n "$RELEASE_PLZ_TOKEN"

      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.source_sha || github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLZ_TOKEN }}

      - name: Verify and create the immutable tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          REQUESTED_SOURCE_SHA: ${{ inputs.source_sha }}
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          version="$(node -p 'require("./package.json").version')"
          node scripts/sync-release-version.mjs "$version" --check
          test "$(jq -r '.["."]' .release-please-manifest.json)" = "$version"
          grep -Eq "^## \\[$version\\]|^## $version([[:space:]]|$)" CHANGELOG.md
          if [[ "$EVENT_NAME" = workflow_dispatch ]]; then
            test "$REQUESTED_VERSION" = "$version"
            test "${#REQUESTED_SOURCE_SHA}" -eq 40
            case "$REQUESTED_SOURCE_SHA" in *[!0-9a-f]*) exit 1;; esac
            test "$(git rev-parse HEAD)" = "$REQUESTED_SOURCE_SHA"
            test "$(git ls-remote --exit-code origin refs/heads/master | cut -f1)" = "$REQUESTED_SOURCE_SHA"
          else
            case "$HEAD_REF" in
              release-please--*)
                test "$PR_TITLE" = "chore(master): release ${version}"
                ;;
              release-please-manual-*)
                test "$PR_TITLE" = "chore(release): v${version}"
                ;;
              *)
                echo "::error::Unapproved release head."
                exit 1
                ;;
            esac
          fi
          if git rev-parse "v${version}" >/dev/null 2>&1; then
            echo "::error::Tag v${version} already exists."
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v${version}" -m "Grok Desktop v${version}"
          git push origin "v${version}"

      - name: Mark the finalized release pull request as tagged
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          version="$(node -p 'require("./package.json").version')"
          if [[ "$EVENT_NAME" = pull_request ]]; then
            release_pr="$EVENT_PR_NUMBER"
          else
            candidates="$(
              gh pr list --state merged --base master --limit 100 \
                --json number,title,headRefName \
                --jq ".[] | select(
                  (.title == \"chore(master): release ${version}\" and (.headRefName | startswith(\"release-please--\"))) or
                  (.title == \"chore(release): v${version}\" and (.headRefName | startswith(\"release-please-manual-\")))
                ) | .number"
            )"
            test "$(wc -w <<<"$candidates")" -eq 1 || {
              echo "::error::Expected exactly one merged release PR for v${version}."
              exit 1
            }
            release_pr="$candidates"
          fi

          pr="$(gh pr view "$release_pr" --json baseRefName,headRefName,mergeCommit,mergedAt,title)"
          test "$(jq -r '.baseRefName' <<<"$pr")" = master
          test "$(jq -r '.mergedAt // empty' <<<"$pr")" != ""
          merge_sha="$(jq -r '.mergeCommit.oid // empty' <<<"$pr")"
          test "${#merge_sha}" -eq 40
          git merge-base --is-ancestor "$merge_sha" HEAD

          gh label create "autorelease: tagged" --force --color 4285F4 \
            --description "Release PR has been finalized with an immutable tag"
          labels="$(gh pr view "$release_pr" --json labels --jq '.labels[].name')"
          edit_args=(--add-label "autorelease: tagged")
          if grep -Fxq "autorelease: pending" <<<"$labels"; then
            edit_args+=(--remove-label "autorelease: pending")
          fi
          gh pr edit "$release_pr" "${edit_args[@]}"
