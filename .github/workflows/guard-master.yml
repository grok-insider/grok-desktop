name: guard master

on:
  pull_request:
    branches: [master]

permissions:
  checks: read
  contents: read

jobs:
  only-dev-into-master:
    name: only dev into master
    runs-on: ubuntu-latest
    steps:
      - name: Verify the pull request head
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_REF: ${{ github.head_ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          case "$HEAD_REF" in
            dev)
              echo "OK: dev is the protected integration promotion head."
              ;;
            release-please--branches--master--components--grok-desktop|release-please-manual-v*)
              check="$(
                gh api -H 'Accept: application/vnd.github+json' \
                  "repos/$GITHUB_REPOSITORY/commits/$HEAD_SHA/check-runs?check_name=release-candidate%2Fv1&filter=latest" \
                  --jq '[.check_runs[] | select(.name == "release-candidate/v1" and .app.slug == "github-actions")] | sort_by(.id) | last // empty'
              )"
              test -n "$check" || {
                echo "::error::Release PR requires an exact release-candidate/v1 check."
                exit 1
              }
              test "$(jq -r .status <<< "$check")" = completed
              test "$(jq -r .conclusion <<< "$check")" = success
              # Prefer external_id (qualification workflow run). details_url may be
              # rewritten by GitHub to /runs/<check-run-id>.
              external_id="$(jq -r '.external_id // empty' <<< "$check")"
              details="$(jq -r '.details_url // empty' <<< "$check")"
              summary="$(jq -r '.output.summary // empty' <<< "$check")"
              if [[ "$external_id" =~ ^[1-9][0-9]*$ ]]; then
                :
              elif [[ "$summary" =~ qualification_workflow_run=([1-9][0-9]*) ]]; then
                :
              else
                case "$details" in
                  "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/"[1-9]*|"$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/runs/"[1-9]*) ;;
                  *) echo "::error::Release qualification check has an invalid workflow binding."; exit 1;;
                esac
              fi
              echo "OK: '$HEAD_REF' has protected exact-candidate qualification."
              ;;
            *)
              echo "::error::PRs into master must come from dev or an approved release-please branch (got '$HEAD_REF')."
              exit 1
              ;;
          esac
