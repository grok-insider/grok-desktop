name: Release prerequisites

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  automation:
    name: Release automation token
    runs-on: ubuntu-latest
    steps:
      - name: Verify owner release token
        env:
          RELEASE_PLZ_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
        run: test -n "$RELEASE_PLZ_TOKEN"

  beta-build:
    name: Preview public build inputs
    runs-on: ubuntu-latest
    environment: beta-build
    steps:
      - name: Verify public update trust
        env:
          UPDATE_TRUST: ${{ vars.GROK_UPDATE_TRUSTED_KEYS_JSON }}
        run: |
          test -n "$UPDATE_TRUST"
          test "${#UPDATE_TRUST}" -le 65536

  beta-windows:
    name: Preview Windows build inputs
    runs-on: ubuntu-latest
    environment: beta-windows-build
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Verify protected Windows inputs without exposing them
        env:
          GROK_WINDOWS_MAX_TESTED_VERSION: ${{ vars.GROK_WINDOWS_MAX_TESTED_VERSION }}
          GROK_UPDATE_TRUSTED_KEYS_JSON: ${{ vars.GROK_UPDATE_TRUSTED_KEYS_JSON }}
          GROK_XAI_COMPONENT_PROVENANCE_EVIDENCE_ID: ${{ vars.GROK_XAI_COMPONENT_PROVENANCE_EVIDENCE_ID }}
          GROK_XAI_COMPONENT_REDISTRIBUTION_EVIDENCE_ID: ${{ vars.GROK_XAI_COMPONENT_REDISTRIBUTION_EVIDENCE_ID }}
        run: |
          for name in \
            GROK_UPDATE_TRUSTED_KEYS_JSON \
            GROK_XAI_COMPONENT_PROVENANCE_EVIDENCE_ID \
            GROK_XAI_COMPONENT_REDISTRIBUTION_EVIDENCE_ID \
            GROK_WINDOWS_MAX_TESTED_VERSION
          do
            value="${!name:-}"
            test -n "$value"
            test "${#value}" -le 65536
          done
          node --input-type=module <<'NODE'
          import { readUnsignedCoreWindowsReleaseEnvironment } from "./apps/desktop/scripts/release-utils.mjs";
          readUnsignedCoreWindowsReleaseEnvironment(process.env);
          NODE

  beta-windows-hosted:
    name: Preview hosted Windows toolchain
    runs-on: windows-latest
    environment: beta-windows-build
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install Rust toolchain for Windows MSVC release builds
        shell: pwsh
        run: |
          rustup show
          rustup target add x86_64-pc-windows-msvc
      - name: Discover hosted MSVC and Rust tools without packaging
        shell: pwsh
        run: |
          node apps/desktop/scripts/resolve-windows-release-toolchain.mjs --arch x64 --skip-cargo-hydration
          if ($LASTEXITCODE -ne 0) { throw "hosted Windows toolchain discovery failed" }

  beta-publish:
    name: Preview publication inputs
    runs-on: ubuntu-latest
    environment: beta-release
    steps:
      - name: Verify update signing inputs
        env:
          KEY_ID: ${{ vars.GROK_UPDATE_SIGNING_KEY_ID }}
          UPDATE_TRUST: ${{ vars.GROK_UPDATE_TRUSTED_KEYS_JSON }}
          PRIVATE_KEY: ${{ secrets.GROK_UPDATE_SIGNING_PRIVATE_KEY_PEM }}
        run: |
          test "$KEY_ID" = "preview-update-2026"
          test -n "$UPDATE_TRUST"
          test -n "$PRIVATE_KEY"
