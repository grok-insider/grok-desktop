name: Release prerequisites

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  automation:
    name: Release automation token
    runs-on: ubuntu-latest
    steps:
      - name: Verify owner release token
        env:
          RELEASE_PLZ_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
        run: test -n "$RELEASE_PLZ_TOKEN"

  beta-build:
    name: Preview public build inputs
    runs-on: ubuntu-latest
    environment: beta-build
    steps:
      - name: Verify public update trust
        env:
          UPDATE_TRUST: ${{ vars.GROK_UPDATE_TRUSTED_KEYS_JSON }}
        run: |
          test -n "$UPDATE_TRUST"
          test "${#UPDATE_TRUST}" -le 65536

  beta-windows:
    name: Preview Windows signing inputs
    runs-on: ubuntu-latest
    environment: beta-windows-signing
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Verify protected Windows inputs without exposing them
        env:
          IDENTITY: ${{ vars.GROK_MSIX_IDENTITY }}
          PUBLISHER: ${{ vars.GROK_MSIX_PUBLISHER }}
          DISPLAY_NAME: ${{ vars.GROK_MSIX_PUBLISHER_DISPLAY_NAME }}
          GROK_WINDOWS_MAX_TESTED_VERSION: ${{ vars.GROK_WINDOWS_MAX_TESTED_VERSION }}
          GROK_WINDOWS_SIGNTOOL_PATH: ${{ vars.GROK_WINDOWS_SIGNTOOL_PATH }}
          GROK_WINDOWS_POWERSHELL_PATH: ${{ vars.GROK_WINDOWS_POWERSHELL_PATH }}
          GROK_WINDOWS_TIMESTAMP_SERVER: ${{ vars.GROK_WINDOWS_TIMESTAMP_SERVER }}
          GROK_WINDOWS_SIGNER_SHA1: ${{ vars.GROK_WINDOWS_SIGNER_SHA1 }}
          GROK_WINDOWS_SIGN_ARGS_JSON: ${{ vars.GROK_WINDOWS_SIGN_ARGS_JSON }}
          GROK_WINDOWS_CARGO_PATH: ${{ vars.GROK_WINDOWS_CARGO_PATH }}
          GROK_WINDOWS_RUSTC_PATH: ${{ vars.GROK_WINDOWS_RUSTC_PATH }}
          GROK_WINDOWS_LINKER_PATH: ${{ vars.GROK_WINDOWS_LINKER_PATH }}
          GROK_WINDOWS_CARGO_CACHE: ${{ vars.GROK_WINDOWS_CARGO_CACHE }}
          GROK_WINDOWS_TOOLCHAIN_ENV_JSON: ${{ vars.GROK_WINDOWS_TOOLCHAIN_ENV_JSON }}
          GROK_UPDATE_TRUSTED_KEYS_JSON: ${{ vars.GROK_UPDATE_TRUSTED_KEYS_JSON }}
          GROK_XAI_COMPONENT_PROVENANCE_EVIDENCE_ID: ${{ vars.GROK_XAI_COMPONENT_PROVENANCE_EVIDENCE_ID }}
          GROK_XAI_COMPONENT_REDISTRIBUTION_EVIDENCE_ID: ${{ vars.GROK_XAI_COMPONENT_REDISTRIBUTION_EVIDENCE_ID }}
          PFX: ${{ secrets.GROK_WINDOWS_PREVIEW_CERT_PFX_BASE64 }}
          PFX_PASSWORD: ${{ secrets.GROK_WINDOWS_PREVIEW_CERT_PASSWORD }}
        run: |
          test "$IDENTITY" = "GrokInsider.GrokDesktop.Preview"
          test "$PUBLISHER" = "CN=Grok Desktop Preview"
          test "$DISPLAY_NAME" = "Grok Desktop Preview"
          test -n "$PFX"
          test -n "$PFX_PASSWORD"
          node --input-type=module <<'NODE'
          import path from "node:path";
          import { parseWindowsToolchainEnvironment } from "./apps/desktop/scripts/build-windows-daemon.mjs";
          import { readCoreWindowsReleaseEnvironment } from "./apps/desktop/scripts/release-utils.mjs";

          readCoreWindowsReleaseEnvironment({
            ...process.env,
            GROK_MSIX_IDENTITY: process.env.IDENTITY,
            GROK_MSIX_PUBLISHER: process.env.PUBLISHER,
            GROK_MSIX_PUBLISHER_DISPLAY_NAME: process.env.DISPLAY_NAME,
          });
          for (const name of [
            "GROK_WINDOWS_CARGO_PATH",
            "GROK_WINDOWS_RUSTC_PATH",
            "GROK_WINDOWS_LINKER_PATH",
            "GROK_WINDOWS_CARGO_CACHE",
          ]) {
            const value = process.env[name] ?? "";
            if (value.length > 1024 || !path.win32.isAbsolute(value)) {
              throw new Error(`${name} must be a bounded absolute Windows path`);
            }
          }
          parseWindowsToolchainEnvironment(process.env.GROK_WINDOWS_TOOLCHAIN_ENV_JSON ?? "");
          NODE

  beta-publish:
    name: Preview publication inputs
    runs-on: ubuntu-latest
    environment: beta-release
    steps:
      - name: Verify update signing inputs
        env:
          KEY_ID: ${{ vars.GROK_UPDATE_SIGNING_KEY_ID }}
          UPDATE_TRUST: ${{ vars.GROK_UPDATE_TRUSTED_KEYS_JSON }}
          PRIVATE_KEY: ${{ secrets.GROK_UPDATE_SIGNING_PRIVATE_KEY_PEM }}
        run: |
          test "$KEY_ID" = "preview-update-2026"
          test -n "$UPDATE_TRUST"
          test -n "$PRIVATE_KEY"
