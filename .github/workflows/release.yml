name: Public release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: public-release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  resolve:
    name: Resolve release contract
    runs-on: ubuntu-latest
    outputs:
      channel: ${{ steps.release.outputs.channel }}
      windows_environment: ${{ steps.release.outputs.windows_environment }}
      publish_environment: ${{ steps.release.outputs.publish_environment }}
      linux_environment: ${{ steps.release.outputs.linux_environment }}
    steps:
      - uses: actions/checkout@v7
      - id: release
        name: Verify tag, source version, and channel
        run: |
          set -euo pipefail
          version="$(node -p 'require("./package.json").version')"
          test "$GITHUB_REF_NAME" = "v$version"
          policy="$(node scripts/release-policy.mjs "$version")"
          channel="$(jq -r .channel <<< "$policy")"
          {
            echo "channel=$channel"
            echo "windows_environment=${channel}-windows-signing"
            echo "publish_environment=${channel}-release"
            if [[ "$channel" = beta ]]; then echo "linux_environment=beta-build"; else echo "linux_environment=stable-release"; fi
          } >> "$GITHUB_OUTPUT"

  linux:
    name: Build Linux x64
    needs: resolve
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: ${{ needs.resolve.outputs.linux_environment }}
    env:
      UPDATE_TRUST_JSON: ${{ vars.GROK_UPDATE_TRUSTED_KEYS_JSON }}
      APPIMAGETOOL_SHA256: ed4ce84f0d9caff66f50bcca6ff6f35aae54ce8135408b3fa33abfc3cb384eb0
      APPIMAGEUPDATETOOL_SHA256: d976cdac667b03dee8cb23fb95ef74b042c406c5cbab3ff294d2b16efeaff84f
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.2
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - uses: cachix/install-nix-action@v31
      - run: pnpm install --frozen-lockfile
      - name: Verify tag matches package version
        shell: bash
        run: |
          version="$(node -p 'require("./package.json").version')"
          test "$GITHUB_REF_NAME" = "v$version"
          test "${{ needs.resolve.outputs.channel }}" = stable -o "${{ needs.resolve.outputs.channel }}" = beta
          echo "RELEASE_CHANNEL=${{ needs.resolve.outputs.channel }}" >> "$GITHUB_ENV"
      - run: pnpm build
      - name: Build native runtime with tracked official Grok pin
        shell: bash
        run: |
          manifest="apps/desktop/release/components/grok-build/linux-x64.json"
          binding="grok-acp-pinned-manifest-v1:$(sha256sum "$manifest" | cut -d' ' -f1)"
          GROK_ACP_PINNED_MANIFEST_BINDING="$binding" \
            nix develop --command cargo build --locked --release \
              -p grok-daemon -p grok-host-tools-mcp
      - name: Acquire exact official Grok Build component
        shell: bash
        run: |
          manifest="apps/desktop/release/components/grok-build/linux-x64.json"
          source_url="$(node -p 'JSON.parse(require("fs").readFileSync(process.argv[1])).sourceUrl' "$manifest")"
          expected_sha="$(node -p 'JSON.parse(require("fs").readFileSync(process.argv[1])).sha256' "$manifest")"
          expected_size="$(node -p 'JSON.parse(require("fs").readFileSync(process.argv[1])).size' "$manifest")"
          curl --fail --location --proto '=https' --tlsv1.2 \
            --output "$RUNNER_TEMP/grok" "$source_url"
          test "$(stat --format=%s "$RUNNER_TEMP/grok")" = "$expected_size"
          echo "$expected_sha  $RUNNER_TEMP/grok" | sha256sum --check --strict
          chmod 700 "$RUNNER_TEMP/grok"
      - name: Acquire pinned AppImage tools
        shell: bash
        run: |
          test -n "$UPDATE_TRUST_JSON"
          install -m 600 /dev/null "$RUNNER_TEMP/update-trusted-keys.json"
          printf '%s\n' "$UPDATE_TRUST_JSON" > "$RUNNER_TEMP/update-trusted-keys.json"
          curl --fail --location --proto '=https' --tlsv1.2 \
            --output "$RUNNER_TEMP/appimagetool.AppImage" \
            https://github.com/AppImage/appimagetool/releases/download/1.9.1/appimagetool-x86_64.AppImage
          curl --fail --location --proto '=https' --tlsv1.2 \
            --output "$RUNNER_TEMP/appimageupdatetool.AppImage" \
            https://github.com/AppImageCommunity/AppImageUpdate/releases/download/2.0.0-alpha-1-20251018/appimageupdatetool-x86_64.AppImage
          echo "$APPIMAGETOOL_SHA256  $RUNNER_TEMP/appimagetool.AppImage" | sha256sum --check --strict
          echo "$APPIMAGEUPDATETOOL_SHA256  $RUNNER_TEMP/appimageupdatetool.AppImage" | sha256sum --check --strict
          chmod 700 "$RUNNER_TEMP/appimagetool.AppImage" "$RUNNER_TEMP/appimageupdatetool.AppImage"
      - name: Package updateable AppImage
        run: |
          release_date="$(git show -s --format=%cs "$GITHUB_SHA")"
          test -n "$release_date"
          pnpm package:linux -- --arch x64 --channel "$RELEASE_CHANNEL" \
            --release-date "$release_date" \
            --acp-pinned-manifest release/components/grok-build/linux-x64.json \
            --acp-component "$RUNNER_TEMP/grok" \
            --appimagetool "$RUNNER_TEMP/appimagetool.AppImage" \
            --appimagetool-sha256 "$APPIMAGETOOL_SHA256" \
            --appimageupdatetool "$RUNNER_TEMP/appimageupdatetool.AppImage" \
            --appimageupdatetool-sha256 "$APPIMAGEUPDATETOOL_SHA256" \
            --update-trust-file "$RUNNER_TEMP/update-trusted-keys.json"
      - uses: actions/upload-artifact@v7
        with:
          name: release-linux-x64
          if-no-files-found: error
          retention-days: 7
          path: |
            out/release/linux/x64/GrokDesktop-*-x64.AppImage
            out/release/linux/x64/GrokDesktop-*-x64.AppImage.zsync
            out/release/linux/x64/linux-package.json
            apps/desktop/release/components/grok-build/linux-x64.json

  windows:
    name: Build Windows x64 core
    needs: resolve
    runs-on: [self-hosted, windows, x64]
    timeout-minutes: 90
    environment:
      name: ${{ needs.resolve.outputs.windows_environment }}
    env:
      GROK_MSIX_IDENTITY: ${{ vars.GROK_MSIX_IDENTITY }}
      GROK_MSIX_PUBLISHER: ${{ vars.GROK_MSIX_PUBLISHER }}
      GROK_MSIX_PUBLISHER_DISPLAY_NAME: ${{ vars.GROK_MSIX_PUBLISHER_DISPLAY_NAME }}
      GROK_WINDOWS_MAX_TESTED_VERSION: ${{ vars.GROK_WINDOWS_MAX_TESTED_VERSION }}
      GROK_WINDOWS_SIGNTOOL_PATH: ${{ vars.GROK_WINDOWS_SIGNTOOL_PATH }}
      GROK_WINDOWS_POWERSHELL_PATH: ${{ vars.GROK_WINDOWS_POWERSHELL_PATH }}
      GROK_WINDOWS_TIMESTAMP_SERVER: ${{ vars.GROK_WINDOWS_TIMESTAMP_SERVER }}
      GROK_WINDOWS_SIGNER_SHA1: ${{ vars.GROK_WINDOWS_SIGNER_SHA1 }}
      GROK_WINDOWS_SIGN_ARGS_JSON: ${{ vars.GROK_WINDOWS_SIGN_ARGS_JSON }}
      GROK_WINDOWS_CARGO_PATH: ${{ vars.GROK_WINDOWS_CARGO_PATH }}
      GROK_WINDOWS_RUSTC_PATH: ${{ vars.GROK_WINDOWS_RUSTC_PATH }}
      GROK_WINDOWS_LINKER_PATH: ${{ vars.GROK_WINDOWS_LINKER_PATH }}
      GROK_WINDOWS_CARGO_CACHE: ${{ vars.GROK_WINDOWS_CARGO_CACHE }}
      GROK_WINDOWS_TOOLCHAIN_ENV_JSON: ${{ vars.GROK_WINDOWS_TOOLCHAIN_ENV_JSON }}
      GROK_WINDOWS_GO_PATH: ${{ vars.GROK_WINDOWS_GO_PATH }}
      GROK_RELEASE_METADATA_PUBLIC_KEYS_JSON: ${{ vars.GROK_RELEASE_METADATA_PUBLIC_KEYS_JSON }}
      GROK_UPDATE_TRUSTED_KEYS_JSON: ${{ vars.GROK_UPDATE_TRUSTED_KEYS_JSON }}
      GROK_ACP_CATALOG_TRUSTED_KEYS: ${{ vars.GROK_ACP_CATALOG_TRUSTED_KEYS }}
      GROK_XAI_COMPONENT_PROVENANCE_EVIDENCE_ID: ${{ vars.GROK_XAI_COMPONENT_PROVENANCE_EVIDENCE_ID }}
      GROK_XAI_COMPONENT_REDISTRIBUTION_EVIDENCE_ID: ${{ vars.GROK_XAI_COMPONENT_REDISTRIBUTION_EVIDENCE_ID }}
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.2
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Verify qualified worker inputs
        shell: pwsh
        run: |
          if ($env:GITHUB_REF_NAME -ne "v$((Get-Content package.json | ConvertFrom-Json).version)") { throw "tag/version mismatch" }
          if (-not $env:GROK_UPDATE_TRUSTED_KEYS_JSON) { throw "update trust is unavailable" }
          $version = (Get-Content package.json | ConvertFrom-Json).version
          if ($env:GROK_UPDATE_TRUSTED_KEYS_JSON.Length -gt 65536) { throw "update trust is oversized" }
          if ("${{ needs.resolve.outputs.channel }}" -eq "beta") {
            if ($env:GROK_MSIX_IDENTITY -ne "GrokInsider.GrokDesktop.Preview") { throw "preview package identity is invalid" }
            if ($env:GROK_MSIX_PUBLISHER -ne "CN=Grok Desktop Preview") { throw "preview publisher is invalid" }
            if ($env:GROK_MSIX_PUBLISHER_DISPLAY_NAME -ne "Grok Desktop Preview") { throw "preview display name is invalid" }
          }
          "RELEASE_CHANNEL=${{ needs.resolve.outputs.channel }}" | Out-File -FilePath $env:GITHUB_ENV -Append
      - name: Provision isolated preview signing certificate
        if: needs.resolve.outputs.channel == 'beta'
        shell: pwsh
        env:
          PREVIEW_PFX_BASE64: ${{ secrets.GROK_WINDOWS_PREVIEW_CERT_PFX_BASE64 }}
          PREVIEW_PFX_PASSWORD: ${{ secrets.GROK_WINDOWS_PREVIEW_CERT_PASSWORD }}
        run: |
          if (-not $env:PREVIEW_PFX_BASE64 -or -not $env:PREVIEW_PFX_PASSWORD) { throw "preview signing secrets are unavailable" }
          $pfx = Join-Path $env:RUNNER_TEMP "grok-preview-signing.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:PREVIEW_PFX_BASE64))
          $runnerSid = [Security.Principal.WindowsIdentity]::GetCurrent().User.Value
          if (-not $runnerSid) { throw "runner security identity is unavailable" }
          & icacls.exe $pfx /inheritance:r /grant:r "*${runnerSid}:(R)" | Out-Null
          if ($LASTEXITCODE -ne 0) { throw "could not restrict preview certificate permissions" }
          $password = ConvertTo-SecureString $env:PREVIEW_PFX_PASSWORD -AsPlainText -Force
          $certificate = Import-PfxCertificate -FilePath $pfx -CertStoreLocation Cert:\CurrentUser\My -Password $password -Exportable:$false
          if (-not $certificate -or $certificate.Thumbprint -ne $env:GROK_WINDOWS_SIGNER_SHA1) { throw "preview certificate does not match the protected thumbprint" }
          if ($certificate.Subject -ne $env:GROK_MSIX_PUBLISHER) { throw "preview certificate subject does not match the package publisher" }
          $cer = Join-Path $env:RUNNER_TEMP "GrokDesktop-Preview.cer"
          Export-Certificate -Cert $certificate -FilePath $cer -Type CERT | Out-Null
          "PREVIEW_PFX_PATH=$pfx" | Out-File -FilePath $env:GITHUB_ENV -Append
          "PREVIEW_CERT_PATH=$cer" | Out-File -FilePath $env:GITHUB_ENV -Append
      - run: pnpm build
      - name: Build and stage source-pinned native runtime
        shell: pwsh
        run: |
          $sourceManifest = "apps/desktop/release/components/grok-build/windows-x64.json"
          $packageManifest = "release/components/grok-build/windows-x64.json"
          $stage = Join-Path $env:RUNNER_TEMP "grok-windows-core-stage"
          if (Test-Path -LiteralPath $stage) {
            $stageItem = Get-Item -LiteralPath $stage -Force
            if (($stageItem.Attributes -band [IO.FileAttributes]::ReparsePoint) -ne 0) {
              throw "Windows core stage must not be a reparse point"
            }
            Remove-Item -LiteralPath $stage -Recurse -Force
          }
          New-Item -ItemType Directory -Force (Join-Path $stage "bin/components/grok-acp/bin") | Out-Null
          pnpm --filter @grok-desktop/desktop build:windows-daemon -- `
            --arch x64 --out (Join-Path $stage "bin/grok-daemon.exe") `
            --acp-pinned-manifest $packageManifest
          $pin = Get-Content -Raw $sourceManifest | ConvertFrom-Json
          curl.exe --fail --location --proto '=https' --tlsv1.2 `
            --output (Join-Path $stage "bin/components/grok-acp/bin/grok.exe") $pin.sourceUrl
          $component = Get-Item (Join-Path $stage "bin/components/grok-acp/bin/grok.exe")
          if ($component.Length -ne $pin.size) { throw "official Grok component size mismatch" }
          if ((Get-FileHash -Algorithm SHA256 $component.FullName).Hash.ToLowerInvariant() -ne $pin.sha256) {
            throw "official Grok component digest mismatch"
          }
          Copy-Item $sourceManifest (Join-Path $stage "bin/components/grok-acp/pinned-component.json")
          "CORE_STAGE=$stage" | Out-File -FilePath $env:GITHUB_ENV -Append
      - name: Assemble and sign core MSIX
        shell: pwsh
        run: |
          pnpm --filter @grok-desktop/desktop package:windows-core `
            --arch x64 --channel $env:RELEASE_CHANNEL --stage $env:CORE_STAGE
      - name: Remove preview private signing material
        if: always() && needs.resolve.outputs.channel == 'beta'
        shell: pwsh
        run: |
          if ($env:GROK_WINDOWS_SIGNER_SHA1) {
            Remove-Item "Cert:\CurrentUser\My\$env:GROK_WINDOWS_SIGNER_SHA1" -Force -ErrorAction SilentlyContinue
          }
          Remove-Item (Join-Path $env:RUNNER_TEMP "grok-preview-signing.pfx") -Force -ErrorAction SilentlyContinue
      - uses: actions/upload-artifact@v7
        with:
          name: release-windows-x64
          if-no-files-found: error
          retention-days: 7
          path: |
            out/release/windows/*/x64/GrokDesktop-*-x64.msix
            out/release/windows/*/x64/GrokDesktop-*-x64.appinstaller
            out/release/windows/*/x64/*.json
            ${{ env.PREVIEW_CERT_PATH }}
            apps/desktop/release/components/grok-build/windows-x64.json

  publish:
    name: Sign metadata and publish
    needs: [resolve, linux, windows]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: ${{ needs.resolve.outputs.publish_environment }}
    permissions:
      contents: write
      id-token: write
      attestations: write
    env:
      UPDATE_KEY_ID: ${{ vars.GROK_UPDATE_SIGNING_KEY_ID }}
      UPDATE_TRUST_JSON: ${{ vars.GROK_UPDATE_TRUSTED_KEYS_JSON }}
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.2
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true
      - name: Prepare protected signing inputs
        shell: bash
        env:
          UPDATE_PRIVATE_KEY: ${{ secrets.GROK_UPDATE_SIGNING_PRIVATE_KEY_PEM }}
        run: |
          test -n "$UPDATE_KEY_ID"
          test -n "$UPDATE_TRUST_JSON"
          test -n "$UPDATE_PRIVATE_KEY"
          install -m 600 /dev/null "$RUNNER_TEMP/update-private-key.pem"
          install -m 600 /dev/null "$RUNNER_TEMP/update-trusted-keys.json"
          printf '%s\n' "$UPDATE_PRIVATE_KEY" > "$RUNNER_TEMP/update-private-key.pem"
          printf '%s\n' "$UPDATE_TRUST_JSON" > "$RUNNER_TEMP/update-trusted-keys.json"
          version="${GITHUB_REF_NAME#v}"
          # shellcheck disable=SC2016
          RELEASE_VERSION="$version" node <<'NODE' > release-assets/release-notes.md
          const fs = require("node:fs");
          const version = process.env.RELEASE_VERSION;
          const sections = fs.readFileSync("CHANGELOG.md", "utf8").split(/^## /m).slice(1);
          const section = sections.find((candidate) => {
            const heading = candidate.split("\n", 1)[0].replace(/^\[/, "").replace(/\].*$/, "").split(/\s/, 1)[0];
            return heading === version;
          });
          if (!section) process.exit(1);
          process.stdout.write(section.slice(section.indexOf("\n") + 1).trimStart());
          NODE
          test -s release-assets/release-notes.md
          major="${version%%.*}"
          remainder="${version#*.}"
          minor="${remainder%%.*}"
          if [[ "$major" = 0 && "$minor" = 0 ]]; then
            cert_sha="$(sha256sum release-assets/GrokDesktop-Preview.cer | cut -d' ' -f1)"
            notes="$(mktemp)"
            {
              printf '> **Preview release:** this 0.0.z build is prerelease software. Windows uses a self-signed preview certificate and a separate package identity. Install \140GrokDesktop-Preview.cer\140 into the current user Trusted People store only after verifying SHA-256 \140%s\140. A future stable certificate uses a separate identity and may require uninstall/reinstall.\n\n' "$cert_sha"
              cat release-assets/release-notes.md
            } > "$notes"
            mv "$notes" release-assets/release-notes.md
          fi
      - name: Generate and verify signed update manifests
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          policy="$(node scripts/release-policy.mjs "$version")"
          channel="$(jq -r .channel <<< "$policy")"
          native_version="$(jq -r .nativeVersion <<< "$policy")"
          for target in linux:x64:AppImage win32:x64:msix; do
            IFS=: read -r platform architecture extension <<< "$target"
            native_package_version="$native_version"
            [[ "$platform" == linux ]] && native_package_version="$version"
            artifact="release-assets/GrokDesktop-$channel-$architecture.$extension"
            manifest="release-assets/GrokDesktop-$channel-$platform-$architecture.update.json"
            pnpm --filter @grok-desktop/desktop release:update-manifest -- \
              --artifact "$artifact" --architecture "$architecture" --channel "$channel" \
              --key-id "$UPDATE_KEY_ID" --out "$manifest" --platform "$platform" \
              --private-key "$RUNNER_TEMP/update-private-key.pem" --version "$version" \
              --native-package-version "$native_package_version" \
              --artifact-url "https://github.com/grok-insider/grok-desktop/releases/download/$GITHUB_REF_NAME/$(basename "$artifact")" \
              --release-notes-url "https://github.com/grok-insider/grok-desktop/releases/download/$GITHUB_REF_NAME/release-notes.md"
            pnpm --filter @grok-desktop/desktop release:verify-update-manifest -- \
              --manifest "$manifest" --trust-file "$RUNNER_TEMP/update-trusted-keys.json" \
              --platform "$platform" --architecture "$architecture" --version "$version"
          done
          rm -f "$RUNNER_TEMP/update-private-key.pem"
      - name: Generate release SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: release-assets/grok-desktop.spdx.json
          upload-artifact: false
          upload-release-assets: false
      - name: Generate checksums and release evidence
        shell: bash
        run: |
          set -euo pipefail
          channel="${{ needs.resolve.outputs.channel }}"
          cert_sha=""
          if [[ -f release-assets/GrokDesktop-Preview.cer ]]; then
            cert_sha="$(sha256sum release-assets/GrokDesktop-Preview.cer | cut -d' ' -f1)"
          fi
          jq -n \
            --arg schema "grok.release-evidence/v1" \
            --arg version "${GITHUB_REF_NAME#v}" \
            --arg channel "$channel" \
            --arg source "$GITHUB_SHA" \
            --arg workflow "$GITHUB_RUN_ID" \
            --arg certificateSha256 "$cert_sha" \
            --arg promotionEnvironment "${{ needs.resolve.outputs.publish_environment }}" \
            '{schema:$schema,version:$version,channel:$channel,sourceRevision:$source,workflowRunId:$workflow,promotionEnvironment:$promotionEnvironment,windowsPreviewCertificateSha256:$certificateSha256}' \
            > release-assets/release-evidence.json
          checksums="$(mktemp)"
          (cd release-assets && find . -maxdepth 1 -type f ! -name SHA256SUMS -printf '%f\n' | LC_ALL=C sort | xargs -r sha256sum) > "$checksums"
          mv "$checksums" release-assets/SHA256SUMS
      - name: Attest release artifacts
        uses: actions/attest@v4
        with:
          subject-path: |
            release-assets/*.AppImage
            release-assets/*.msix
            release-assets/*.appinstaller
            release-assets/*.cer
      - name: Publish immutable tag release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          test "$(git tag --points-at HEAD)" = "$GITHUB_REF_NAME"
          release_flags=()
          version="${GITHUB_REF_NAME#v}"
          policy="$(node scripts/release-policy.mjs "$version")"
          if [[ "$(jq -r .prerelease <<< "$policy")" = true ]]; then
            release_flags+=(--prerelease)
          fi
          gh release create "$GITHUB_REF_NAME" release-assets/* \
            --repo grok-insider/grok-desktop --title "Grok Desktop $GITHUB_REF_NAME" \
            --notes-file release-assets/release-notes.md --verify-tag "${release_flags[@]}"
