name: Public release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Exact existing immutable tag for transient promotion recovery
        required: true
        type: string
      qualification_run_id:
        description: Exact qualification run bound by the annotated tag
        required: true
        type: string

concurrency:
  group: public-release
  cancel-in-progress: false

permissions:
  actions: read
  contents: read

jobs:
  resolve:
    name: Resolve qualified release contract
    if: github.event_name == 'push' || github.actor == 'grok-insider'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
      channel: ${{ steps.release.outputs.channel }}
      publish_environment: ${{ steps.release.outputs.publish_environment }}
      qualification_run: ${{ steps.release.outputs.qualification_run }}
      candidate_run: ${{ steps.release.outputs.candidate_run }}
      linux_artifact_id: ${{ steps.release.outputs.linux_artifact_id }}
      windows_artifact_id: ${{ steps.release.outputs.windows_artifact_id }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 0
          persist-credentials: false
      - id: annotation
        name: Resolve tag annotation
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REQUESTED_TAG: ${{ inputs.tag }}
          REQUESTED_QUALIFICATION_RUN: ${{ inputs.qualification_run_id }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" = workflow_dispatch ]]; then tag="$REQUESTED_TAG"; else tag="$GITHUB_REF_NAME"; fi
          case "$tag" in v[0-9]*.[0-9]*.[0-9]*) ;; *) exit 1;; esac
          test "$(git cat-file -t "refs/tags/$tag")" = tag
          test "$(git rev-parse "refs/tags/$tag^{commit}")" = "$(git rev-parse HEAD)"
          qualification_run="$(git for-each-ref --format='%(contents)' "refs/tags/$tag" | sed -n 's/^Qualification-Run: \([1-9][0-9]*\)$/\1/p')"
          test -n "$qualification_run"
          if [[ "$EVENT_NAME" = workflow_dispatch ]]; then test "$qualification_run" = "$REQUESTED_QUALIFICATION_RUN"; fi
          {
            echo "tag=$tag"
            echo "qualification_run=$qualification_run"
          } >> "$GITHUB_OUTPUT"
      - uses: actions/download-artifact@v8
        with:
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.annotation.outputs.qualification_run }}
          name: release-qualification
          path: qualification
      - id: release
        name: Verify qualification, tag tree, version, and artifacts
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.annotation.outputs.tag }}
          QUALIFICATION_RUN: ${{ steps.annotation.outputs.qualification_run }}
        run: |
          set -euo pipefail
          run="$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$QUALIFICATION_RUN")"
          test "$(jq -r .conclusion <<< "$run")" = success
          test "$(jq -r .event <<< "$run")" = workflow_dispatch
          test "$(jq -r .head_branch <<< "$run")" = master
          test "$(jq -r .path <<< "$run")" = .github/workflows/qualify-release-candidate.yml
          version="$(node -p 'require("./package.json").version')"
          test "$TAG" = "v$version"
          node scripts/sync-release-version.mjs "$version" --check
          tree_sha="$(git rev-parse 'HEAD^{tree}')"
          source_sha="$(jq -r '.candidate.sourceSha' qualification/release-qualification.json)"
          node scripts/release-candidate.mjs verify-qualification \
            --qualification qualification/release-qualification.json \
            --version "$version" --source-sha "$source_sha" --tree-sha "$tree_sha"
          test "$(jq -r '.qualification.workflowRunId' qualification/release-qualification.json)" = "$QUALIFICATION_RUN"
          policy="$(node scripts/release-policy.mjs "$version")"
          channel="$(jq -r .channel <<< "$policy")"
          {
            echo "tag=$TAG"
            echo "version=$version"
            echo "channel=$channel"
            echo "publish_environment=${channel}-release"
            echo "qualification_run=$QUALIFICATION_RUN"
            echo "candidate_run=$(jq -r '.candidate.workflowRunId' qualification/release-qualification.json)"
            echo "linux_artifact_id=$(jq -r '.candidate.artifacts[] | select(.platform == "linux") | .id' qualification/release-qualification.json)"
            echo "windows_artifact_id=$(jq -r '.candidate.artifacts[] | select(.platform == "windows") | .id' qualification/release-qualification.json)"
          } >> "$GITHUB_OUTPUT"

  publish:
    name: Promote exact artifacts, sign metadata, and publish
    needs: resolve
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: ${{ needs.resolve.outputs.publish_environment }}
    permissions:
      actions: read
      contents: write
      id-token: write
      attestations: write
    env:
      RELEASE_TAG: ${{ needs.resolve.outputs.tag }}
      RELEASE_VERSION: ${{ needs.resolve.outputs.version }}
      RELEASE_CHANNEL: ${{ needs.resolve.outputs.channel }}
      UPDATE_KEY_ID: ${{ vars.GROK_UPDATE_SIGNING_KEY_ID }}
      UPDATE_TRUST_JSON: ${{ vars.GROK_UPDATE_TRUSTED_KEYS_JSON }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.resolve.outputs.tag }}
          persist-credentials: false
      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.2
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v8
        with:
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ needs.resolve.outputs.qualification_run }}
          name: release-qualification
          path: qualification
      - uses: actions/download-artifact@v8
        with:
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ needs.resolve.outputs.candidate_run }}
          artifact-ids: ${{ needs.resolve.outputs.linux_artifact_id }}
          path: candidate-downloads/linux
      - uses: actions/download-artifact@v8
        with:
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ needs.resolve.outputs.candidate_run }}
          artifact-ids: ${{ needs.resolve.outputs.windows_artifact_id }}
          path: candidate-downloads/windows
      - name: Verify and stage the exact qualified asset allowlist
        shell: bash
        run: |
          set -euo pipefail
          jq '.candidate' qualification/release-qualification.json > release-candidate.json
          node scripts/release-candidate.mjs verify-record \
            --record release-candidate.json --downloads candidate-downloads
          mkdir release-downloads
          cp -a candidate-downloads/linux/. release-downloads/
          cp -a candidate-downloads/windows/. release-downloads/
          node scripts/stage-release-assets.mjs release-downloads release-assets "$RELEASE_CHANNEL"
          cp qualification/release-qualification.json release-assets/release-qualification.json
      - name: Prepare protected signing inputs and release notes
        shell: bash
        env:
          UPDATE_PRIVATE_KEY: ${{ secrets.GROK_UPDATE_SIGNING_PRIVATE_KEY_PEM }}
        run: |
          set -euo pipefail
          test -n "$UPDATE_KEY_ID"
          test -n "$UPDATE_TRUST_JSON"
          test -n "$UPDATE_PRIVATE_KEY"
          install -m 600 /dev/null "$RUNNER_TEMP/update-private-key.pem"
          install -m 600 /dev/null "$RUNNER_TEMP/update-trusted-keys.json"
          printf '%s\n' "$UPDATE_PRIVATE_KEY" > "$RUNNER_TEMP/update-private-key.pem"
          printf '%s\n' "$UPDATE_TRUST_JSON" > "$RUNNER_TEMP/update-trusted-keys.json"
          node <<'NODE' > release-assets/release-notes.md
          const fs = require("node:fs");
          const version = process.env.RELEASE_VERSION;
          const sections = fs.readFileSync("CHANGELOG.md", "utf8").split(/^## /m).slice(1);
          const section = sections.find((candidate) => {
            const heading = candidate.split("\n", 1)[0].replace(/^\[/, "").replace(/\].*$/, "").split(/\s/, 1)[0];
            return heading === version;
          });
          if (!section) process.exit(1);
          process.stdout.write(section.slice(section.indexOf("\n") + 1).trimStart());
          NODE
          test -s release-assets/release-notes.md
          notes="$(mktemp)"
          {
            printf '> **Windows installer notice:** \140GrokDesktop-%s-x64.exe\140 is intentionally unsigned. Windows may show an Unknown Publisher or Microsoft Defender SmartScreen warning. Before proceeding, verify the installer against [\140SHA256SUMS\140](https://github.com/grok-insider/grok-desktop/releases/download/%s/SHA256SUMS) and the [GitHub artifact attestation](https://github.com/grok-insider/grok-desktop/attestations) for this release. Audit the corresponding [immutable source tag](https://github.com/grok-insider/grok-desktop/tree/%s).\n\n' "$RELEASE_CHANNEL" "$RELEASE_TAG" "$RELEASE_TAG"
            cat release-assets/release-notes.md
          } > "$notes"
          mv "$notes" release-assets/release-notes.md
      - name: Generate and verify signed update manifests
        shell: bash
        run: |
          set -euo pipefail
          # pnpm --filter runs scripts with apps/desktop as cwd; use absolute paths.
          assets_root="$GITHUB_WORKSPACE/release-assets"
          for target in linux:x64:AppImage:appimage win32:x64:exe:nsis-installer; do
            IFS=: read -r platform architecture extension artifact_kind <<< "$target"
            artifact="$assets_root/GrokDesktop-$RELEASE_CHANNEL-$architecture.$extension"
            manifest="$assets_root/GrokDesktop-$RELEASE_CHANNEL-$platform-$architecture.update.json"
            test -f "$artifact"
            pnpm --filter @grok-desktop/desktop release:update-manifest \
              --artifact "$artifact" --architecture "$architecture" --channel "$RELEASE_CHANNEL" \
              --artifact-kind "$artifact_kind" --key-id "$UPDATE_KEY_ID" --out "$manifest" \
              --platform "$platform" --private-key "$RUNNER_TEMP/update-private-key.pem" \
              --version "$RELEASE_VERSION" --native-package-version "$RELEASE_VERSION" \
              --artifact-url "https://github.com/grok-insider/grok-desktop/releases/download/$RELEASE_TAG/$(basename "$artifact")" \
              --release-notes-url "https://github.com/grok-insider/grok-desktop/releases/download/$RELEASE_TAG/release-notes.md"
            pnpm --filter @grok-desktop/desktop release:verify-update-manifest \
              --manifest "$manifest" --trust-file "$RUNNER_TEMP/update-trusted-keys.json" \
              --platform "$platform" --architecture "$architecture" --channel "$RELEASE_CHANNEL" \
              --version "$RELEASE_VERSION"
          done
          rm -f "$RUNNER_TEMP/update-private-key.pem"
      - name: Generate release SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: release-assets/grok-desktop.spdx.json
          upload-artifact: false
          upload-release-assets: false
      - name: Generate checksums and release evidence
        shell: bash
        run: |
          set -euo pipefail
          jq -n \
            --arg schema "grok.release-evidence/v1" --arg version "$RELEASE_VERSION" \
            --arg channel "$RELEASE_CHANNEL" --arg source "$GITHUB_SHA" \
            --arg workflow "$GITHUB_RUN_ID" --arg workflowAttempt "$GITHUB_RUN_ATTEMPT" \
            --arg candidateRun "${{ needs.resolve.outputs.candidate_run }}" \
            --arg qualificationRun "${{ needs.resolve.outputs.qualification_run }}" \
            --arg windowsCodeSigning "unsigned" \
            --arg promotionEnvironment "${{ needs.resolve.outputs.publish_environment }}" \
            '{schema:$schema,version:$version,channel:$channel,sourceRevision:$source,workflowRunId:$workflow,workflowRunAttempt:$workflowAttempt,candidateRunId:$candidateRun,qualificationRunId:$qualificationRun,promotionEnvironment:$promotionEnvironment,windowsCodeSigning:$windowsCodeSigning}' \
            > release-assets/release-evidence.json
          checksums="$(mktemp)"
          (cd release-assets && find . -maxdepth 1 -type f ! -name SHA256SUMS -printf '%f\n' | LC_ALL=C sort | xargs -r sha256sum) > "$checksums"
          mv "$checksums" release-assets/SHA256SUMS
      - name: Attest release artifacts
        uses: actions/attest@v4
        with:
          subject-path: |
            release-assets/*.AppImage
            release-assets/*.exe
      - name: Publish immutable tag release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          test "$(git tag --points-at HEAD)" = "$RELEASE_TAG"
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "::error::Release $RELEASE_TAG already exists; refusing to replace public assets."
            exit 1
          fi
          release_flags=()
          policy="$(node scripts/release-policy.mjs "$RELEASE_VERSION")"
          if [[ "$(jq -r .prerelease <<< "$policy")" = true ]]; then release_flags+=(--prerelease); fi
          gh release create "$RELEASE_TAG" release-assets/* \
            --repo "$GITHUB_REPOSITORY" --title "Grok Desktop $RELEASE_TAG" \
            --notes-file release-assets/release-notes.md --verify-tag "${release_flags[@]}"
