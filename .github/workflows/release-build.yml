name: Release artifact build

on:
  workflow_call:
    inputs:
      source_sha:
        required: true
        type: string
      version:
        required: true
        type: string
      channel:
        required: true
        type: string
      linux_environment:
        required: true
        type: string
      windows_environment:
        required: true
        type: string
    outputs:
      linux_artifact_id:
        value: ${{ jobs.linux.outputs.artifact_id }}
      linux_artifact_digest:
        value: ${{ jobs.linux.outputs.artifact_digest }}
      windows_artifact_id:
        value: ${{ jobs.windows.outputs.artifact_id }}
      windows_artifact_digest:
        value: ${{ jobs.windows.outputs.artifact_digest }}

permissions:
  contents: read

jobs:
  linux:
    name: Build Linux x64
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: ${{ inputs.linux_environment }}
    outputs:
      artifact_id: ${{ steps.upload.outputs.artifact-id }}
      artifact_digest: ${{ steps.upload.outputs.artifact-digest }}
    env:
      UPDATE_TRUST_JSON: ${{ vars.GROK_UPDATE_TRUSTED_KEYS_JSON }}
      APPIMAGETOOL_SHA256: ed4ce84f0d9caff66f50bcca6ff6f35aae54ce8135408b3fa33abfc3cb384eb0
      APPIMAGEUPDATETOOL_SHA256: d976cdac667b03dee8cb23fb95ef74b042c406c5cbab3ff294d2b16efeaff84f
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.source_sha }}
          persist-credentials: false
      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.2
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - uses: cachix/install-nix-action@v31
      - run: pnpm install --frozen-lockfile
      - name: Verify candidate source and channel
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ inputs.source_sha }}"
          test "$(node -p 'require("./package.json").version')" = "${{ inputs.version }}"
          policy="$(node scripts/release-policy.mjs "${{ inputs.version }}")"
          test "$(jq -r .channel <<< "$policy")" = "${{ inputs.channel }}"
          echo "RELEASE_CHANNEL=${{ inputs.channel }}" >> "$GITHUB_ENV"
      - run: pnpm build
      - name: Build portable native runtime with tracked official Grok pin
        shell: bash
        run: |
          runtime="$RUNNER_TEMP/grok-portable-linux-runtime"
          nix build --print-build-logs --out-link "$runtime" .#portableLinuxRuntime
          for executable in grok-daemon grok-host-tools-mcp; do
            test -x "$runtime/bin/$executable"
            node --input-type=module - "$runtime/bin/$executable" "$executable" <<'NODE'
          import { inspectPortableLinuxRuntimeFile } from "./apps/desktop/scripts/linux-native-runtime-policy.mjs";
          const [file, label] = process.argv.slice(2);
          await inspectPortableLinuxRuntimeFile(file, "x64", label);
          NODE
            if readelf --program-headers --wide "$runtime/bin/$executable" \
                | grep -Eq '(^|[[:space:]])INTERP([[:space:]]|$)' \
                || readelf --dynamic --wide "$runtime/bin/$executable" \
                | grep -Eq '\((NEEDED|RPATH|RUNPATH|CONFIG|DEPAUDIT|AUDIT|AUXILIARY|FILTER)\)'; then
              echo "$executable depends on a host loader or shared library" >&2
              exit 1
            fi
          done
      - name: Acquire exact official Grok Build component
        shell: bash
        run: |
          manifest="apps/desktop/release/components/grok-build/linux-x64.json"
          source_url="$(node -p 'JSON.parse(require("fs").readFileSync(process.argv[1])).sourceUrl' "$manifest")"
          expected_sha="$(node -p 'JSON.parse(require("fs").readFileSync(process.argv[1])).sha256' "$manifest")"
          expected_size="$(node -p 'JSON.parse(require("fs").readFileSync(process.argv[1])).size' "$manifest")"
          curl --fail --location --proto '=https' --tlsv1.2 --output "$RUNNER_TEMP/grok" "$source_url"
          test "$(stat --format=%s "$RUNNER_TEMP/grok")" = "$expected_size"
          echo "$expected_sha  $RUNNER_TEMP/grok" | sha256sum --check --strict
          chmod 700 "$RUNNER_TEMP/grok"
      - name: Acquire pinned AppImage tools
        shell: bash
        run: |
          test -n "$UPDATE_TRUST_JSON"
          install -m 600 /dev/null "$RUNNER_TEMP/update-trusted-keys.json"
          printf '%s\n' "$UPDATE_TRUST_JSON" > "$RUNNER_TEMP/update-trusted-keys.json"
          curl --fail --location --proto '=https' --tlsv1.2 \
            --output "$RUNNER_TEMP/appimagetool.AppImage" \
            https://github.com/AppImage/appimagetool/releases/download/1.9.1/appimagetool-x86_64.AppImage
          curl --fail --location --proto '=https' --tlsv1.2 \
            --output "$RUNNER_TEMP/appimageupdatetool.AppImage" \
            https://github.com/AppImageCommunity/AppImageUpdate/releases/download/2.0.0-alpha-1-20251018/appimageupdatetool-x86_64.AppImage
          echo "$APPIMAGETOOL_SHA256  $RUNNER_TEMP/appimagetool.AppImage" | sha256sum --check --strict
          echo "$APPIMAGEUPDATETOOL_SHA256  $RUNNER_TEMP/appimageupdatetool.AppImage" | sha256sum --check --strict
          chmod 700 "$RUNNER_TEMP/appimagetool.AppImage" "$RUNNER_TEMP/appimageupdatetool.AppImage"
      - name: Package updateable AppImage
        shell: bash
        run: |
          release_date="$(git show -s --format=%cs "${{ inputs.source_sha }}")"
          test -n "$release_date"
          pnpm package:linux -- --arch x64 --channel "$RELEASE_CHANNEL" \
            --release-date "$release_date" \
            --daemon "$RUNNER_TEMP/grok-portable-linux-runtime/bin/grok-daemon" \
            --host-tools-helper "$RUNNER_TEMP/grok-portable-linux-runtime/bin/grok-host-tools-mcp" \
            --acp-pinned-manifest release/components/grok-build/linux-x64.json \
            --acp-component "$RUNNER_TEMP/grok" \
            --appimagetool "$RUNNER_TEMP/appimagetool.AppImage" \
            --appimagetool-sha256 "$APPIMAGETOOL_SHA256" \
            --appimageupdatetool "$RUNNER_TEMP/appimageupdatetool.AppImage" \
            --appimageupdatetool-sha256 "$APPIMAGEUPDATETOOL_SHA256" \
            --update-trust-file "$RUNNER_TEMP/update-trusted-keys.json"
      - name: Verify final Linux release artifact
        run: |
          pnpm --filter @grok-desktop/desktop release:verify-linux-artifact -- \
            --appimage "$GITHUB_WORKSPACE/out/release/linux/x64/GrokDesktop-$RELEASE_CHANNEL-x64.AppImage" \
            --record "$GITHUB_WORKSPACE/out/release/linux/x64/linux-package.json" \
            --acp-pin "$GITHUB_WORKSPACE/apps/desktop/release/components/grok-build/linux-x64.json"
      - id: upload
        uses: actions/upload-artifact@v7
        with:
          name: release-linux-x64
          if-no-files-found: error
          retention-days: 30
          path: |
            out/release/linux/x64/GrokDesktop-*-x64.AppImage
            out/release/linux/x64/GrokDesktop-*-x64.AppImage.zsync
            out/release/linux/x64/linux-package.json
            apps/desktop/release/components/grok-build/linux-x64.json

  windows:
    name: Build Windows x64 core
    runs-on: [self-hosted, windows, x64]
    timeout-minutes: 90
    environment:
      name: ${{ inputs.windows_environment }}
    outputs:
      artifact_id: ${{ steps.upload.outputs.artifact-id }}
      artifact_digest: ${{ steps.upload.outputs.artifact-digest }}
    env:
      GROK_WINDOWS_MAX_TESTED_VERSION: ${{ vars.GROK_WINDOWS_MAX_TESTED_VERSION }}
      GROK_WINDOWS_CARGO_PATH: ${{ vars.GROK_WINDOWS_CARGO_PATH }}
      GROK_WINDOWS_RUSTC_PATH: ${{ vars.GROK_WINDOWS_RUSTC_PATH }}
      GROK_WINDOWS_LINKER_PATH: ${{ vars.GROK_WINDOWS_LINKER_PATH }}
      GROK_WINDOWS_CARGO_CACHE: ${{ vars.GROK_WINDOWS_CARGO_CACHE }}
      GROK_WINDOWS_TOOLCHAIN_ENV_JSON: ${{ vars.GROK_WINDOWS_TOOLCHAIN_ENV_JSON }}
      GROK_UPDATE_TRUSTED_KEYS_JSON: ${{ vars.GROK_UPDATE_TRUSTED_KEYS_JSON }}
      GROK_XAI_COMPONENT_PROVENANCE_EVIDENCE_ID: ${{ vars.GROK_XAI_COMPONENT_PROVENANCE_EVIDENCE_ID }}
      GROK_XAI_COMPONENT_REDISTRIBUTION_EVIDENCE_ID: ${{ vars.GROK_XAI_COMPONENT_REDISTRIBUTION_EVIDENCE_ID }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.source_sha }}
          persist-credentials: false
      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.2
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Verify candidate source and qualified worker inputs
        shell: pwsh
        run: |
          if ((git rev-parse HEAD) -ne "${{ inputs.source_sha }}") { throw "candidate source mismatch" }
          if ((Get-Content package.json | ConvertFrom-Json).version -ne "${{ inputs.version }}") { throw "candidate version mismatch" }
          if (-not $env:GROK_UPDATE_TRUSTED_KEYS_JSON) { throw "update trust is unavailable" }
          if ($env:GROK_UPDATE_TRUSTED_KEYS_JSON.Length -gt 65536) { throw "update trust is oversized" }
          foreach ($name in @(
            "CSC_LINK", "CSC_KEY_PASSWORD", "WIN_CSC_LINK", "WIN_CSC_KEY_PASSWORD",
            "WINDOWS_CERTIFICATE_FILE", "WINDOWS_CERTIFICATE_PASSWORD",
            "GROK_WINDOWS_SIGNTOOL_PATH", "GROK_WINDOWS_TIMESTAMP_SERVER",
            "GROK_WINDOWS_SIGNER_SHA1", "GROK_WINDOWS_SIGN_ARGS_JSON"
          )) {
            if ([Environment]::GetEnvironmentVariable($name)) { throw "unsigned Windows packaging rejects ambient signing input: $name" }
          }
          "RELEASE_CHANNEL=${{ inputs.channel }}" | Out-File -FilePath $env:GITHUB_ENV -Append
      - run: pnpm build
      - name: Build and stage source-pinned native runtime
        shell: pwsh
        run: |
          $sourceManifest = "apps/desktop/release/components/grok-build/windows-x64.json"
          $packageManifest = "release/components/grok-build/windows-x64.json"
          $stage = Join-Path $env:RUNNER_TEMP "grok-windows-core-stage"
          if (Test-Path -LiteralPath $stage) {
            $stageItem = Get-Item -LiteralPath $stage -Force
            if (($stageItem.Attributes -band [IO.FileAttributes]::ReparsePoint) -ne 0) { throw "Windows core stage must not be a reparse point" }
            Remove-Item -LiteralPath $stage -Recurse -Force
          }
          New-Item -ItemType Directory -Force (Join-Path $stage "bin/components/grok-acp/bin") | Out-Null
          pnpm --filter @grok-desktop/desktop build:windows-daemon `
            --arch x64 --out (Join-Path $stage "bin/grok-daemon.exe") `
            --acp-pinned-manifest $packageManifest
          if ($LASTEXITCODE -ne 0) { throw "Windows native runtime build failed" }
          foreach ($nativeExecutable in @("grok-daemon.exe", "grok-host-tools-mcp.exe")) {
            if (-not (Test-Path -LiteralPath (Join-Path $stage "bin/$nativeExecutable") -PathType Leaf)) {
              throw "Windows native runtime output is incomplete"
            }
          }
          $pin = Get-Content -Raw $sourceManifest | ConvertFrom-Json
          curl.exe --fail --location --proto '=https' --tlsv1.2 `
            --output (Join-Path $stage "bin/components/grok-acp/bin/grok.exe") $pin.sourceUrl
          if ($LASTEXITCODE -ne 0) { throw "official Grok component download failed" }
          $component = Get-Item (Join-Path $stage "bin/components/grok-acp/bin/grok.exe")
          if ($component.Length -ne $pin.size) { throw "official Grok component size mismatch" }
          if ((Get-FileHash -Algorithm SHA256 $component.FullName).Hash.ToLowerInvariant() -ne $pin.sha256) {
            throw "official Grok component digest mismatch"
          }
          Copy-Item $sourceManifest (Join-Path $stage "bin/components/grok-acp/pinned-component.json")
          "CORE_STAGE=$stage" | Out-File -FilePath $env:GITHUB_ENV -Append
      - name: Assemble unsigned core NSIS installer
        shell: pwsh
        run: |
          pnpm --filter @grok-desktop/desktop package:windows-core `
            --arch x64 --channel $env:RELEASE_CHANNEL --stage $env:CORE_STAGE
          if ($LASTEXITCODE -ne 0) { throw "Windows core packaging failed" }
      - id: upload
        uses: actions/upload-artifact@v7
        with:
          name: release-windows-x64
          if-no-files-found: error
          retention-days: 30
          path: |
            out/release/windows/*/x64/GrokDesktop-*-x64.exe
            out/release/windows/*/x64/*.json
            apps/desktop/release/components/grok-build/windows-x64.json
