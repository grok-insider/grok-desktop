name: Bug report
description: Report a reproducible Grok Desktop defect
title: "bug: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: >-
        Remove credentials, private prompts, account exports, and unrelated
        personal data. Security vulnerabilities belong in SECURITY.md.
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: 0.0.1 or commit SHA
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows 11 x64
        - Windows 11 ARM64
        - macOS
        - Linux
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Runtime mode
      options:
        - Limited Mode
        - Strong Work Mode
        - Unknown
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction
      description: Give the smallest deterministic sequence that triggers the issue.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Redacted diagnostics
      description: Attach a support bundle only after checking its contents.
